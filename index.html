<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Modern browsers use SVG (scales to any DPR); legacy fallback to PNG -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/wgh-icon.png" />

    <!-- Preconnect to critical origins for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://vpioftosgdkyiwvhxewy.supabase.co" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://us.posthog.com" />

    <!-- Fonts:
         - Amatic SC + Outfit: legacy splash wordmark + body (kept until full redesign port)
         - Fraunces + Inter + JetBrains Mono: editorial redesign (Claude Design — paper theme) -->
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Mobile-first viewport with safe area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#F0ECE8" />
    <meta name="description" content="Find the best dishes at restaurants near you. See what's worth ordering and what to avoid." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="What's Good Here" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="What's Good Here" />
    <meta property="og:description" content="Find the best dishes at restaurants near you" />
    <meta property="og:url" content="https://whats-good-here.vercel.app" />
    <meta property="og:image" content="https://whats-good-here.vercel.app/og-image.png" />
    <meta property="og:site_name" content="What's Good Here" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="What's Good Here" />
    <meta name="twitter:description" content="Find the best dishes at restaurants near you" />
    <meta name="twitter:image" content="https://whats-good-here.vercel.app/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://whats-good-here.vercel.app" />

    <title>What's Good Here</title>
  </head>
