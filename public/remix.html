<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>What's Good Here — Redesign</title>
<link rel="icon" href="remix-assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Archivo:wght@500;600;700;800;900&family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Alfa+Slab+One&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat+Brush&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --paper: #F4EFE8;
    --paper-2: #EBE5DB;
    --ink: #1A1714;
    --ink-2: #5A5248;
    --ink-3: #8B8275;
    --rule: #D8CFBE;
    --rule-2: #BFB39B;
    --tomato: #C5412A;
    --tomato-soft: #E8D2CB;
    --ochre: #B8893A;
    --ochre-soft: #EBD9B4;
    --moss: #5C6B3A;
    --card: #FBF8F2;
    --shadow-ink: 0 1px 0 rgba(26,23,20,.06), 0 8px 24px -12px rgba(26,23,20,.18);
  }
  [data-theme="dusk"] {
    --paper: #1C1B19;
    --paper-2: #252320;
    --ink: #F3EADA;
    --ink-2: #B8ADA0;
    --ink-3: #857B6E;
    --rule: #3A352E;
    --rule-2: #514A40;
    --tomato: #E56A4C;
    --tomato-soft: #3A2520;
    --ochre: #D9A655;
    --ochre-soft: #3A2E18;
    --moss: #8FA05C;
    --card: #252320;
    --shadow-ink: 0 1px 0 rgba(0,0,0,.2), 0 8px 24px -12px rgba(0,0,0,.6);
  }

  /* === ZINE PUNK === riso-printed, hot magenta + cyan + canary, chunky grotesk */
  [data-theme="zine"] {
    --paper: #F2EDE0;
    --paper-2: #FFE94A;   /* canary flash */
    --ink: #0A0A0A;
    --ink-2: #2B2B2B;
    --ink-3: #6A6A6A;
    --rule: #0A0A0A;
    --rule-2: #0A0A0A;
    --tomato: #FF2D87;    /* hot magenta */
    --tomato-soft: #FFD1E3;
    --ochre: #FFE94A;     /* canary */
    --ochre-soft: #FFF4A8;
    --moss: #00B7C7;      /* cyan */
    --card: #FFFDF5;
    --shadow-ink: 3px 3px 0 #0A0A0A;
    --font-serif: 'Archivo Black', 'Archivo', Impact, sans-serif;
    --font-sans:  'Space Grotesk', 'Archivo', system-ui, sans-serif;
    --font-mono:  'DM Mono', ui-monospace, monospace;
  }
  /* Zine: chunky Archivo Black display, clean Space Grotesk body */
  [data-theme="zine"] .serif {
    font-family: 'Archivo Black', Impact, sans-serif !important;
    font-style: normal !important;
    font-weight: 400 !important;
    letter-spacing: -.02em !important;
    text-transform: none;
  }
  [data-theme="zine"] h1.serif,
  [data-theme="zine"] h2.serif {
    font-family: 'Archivo Black', Impact, sans-serif !important;
    font-weight: 400 !important;
    letter-spacing: -.03em !important;
    text-transform: none;
    line-height: .95 !important;
  }
  [data-theme="zine"] body,
  [data-theme="zine"] * { font-family: var(--font-sans); }
  [data-theme="zine"] .mono { font-family: var(--font-mono); }
  [data-theme="zine"] .app-shell {
    background:
      radial-gradient(circle at 1px 1px, rgba(0,183,199,.18) 1px, transparent 1.5px) 0 0/6px 6px,
      var(--paper);
  }
  [data-theme="zine"] .app-shell::after {
    content:""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle at 2px 2px, rgba(255,45,135,.12) 1px, transparent 2px) 0 0/10px 10px;
    mix-blend-mode: multiply;
  }
  [data-theme="zine"] .stripe-ph {
    background:
      repeating-linear-gradient(45deg, #FF2D87 0 6px, #0A0A0A 6px 7px, #FFE94A 7px 13px, #0A0A0A 13px 14px);
  }
  [data-theme="zine"] .vote-pill {
    border: 1.5px solid var(--ink) !important;
    border-radius: 4px !important;
    box-shadow: 2px 2px 0 var(--ink);
    font-weight: 700 !important;
    text-transform: uppercase;
  }
  [data-theme="zine"] .vote-pill.yes { background: #FF2D87; color: #FFF; }
  [data-theme="zine"] .vote-pill.no  { background: #00B7C7; color: #FFF; }
  [data-theme="zine"] .chip {
    border: 1.5px solid var(--ink); border-radius: 4px;
    background: var(--card); box-shadow: 2px 2px 0 var(--ink);
    font-weight: 700; text-transform: uppercase;
  }
  [data-theme="zine"] .chip.active { background: #FF2D87; color: #FFF; border-color: var(--ink); }
  [data-theme="zine"] .tab-btn.active::after { background: #FF2D87; height: 4px; }
  [data-theme="zine"] .seg { border: 1.5px solid var(--ink); border-radius: 4px; background: var(--card); box-shadow: 2px 2px 0 var(--ink); }
  [data-theme="zine"] .seg button.on { background: #0A0A0A; color: #FFE94A; border-radius: 2px; }
  [data-theme="zine"] .navbar { background: #FFE94A; border-top: 2px solid var(--ink); backdrop-filter: none; }
  [data-theme="zine"] .nav-btn.active { background: #FF2D87; color: #FFF; }
  [data-theme="zine"] button[class*="press"],
  [data-theme="zine"] .ballot,
  [data-theme="zine"] .seg,
  [data-theme="zine"] input { border-radius: 4px !important; }
  [data-theme="zine"] .conf-bar { background: var(--ink); border-radius: 0; height: 6px; }
  [data-theme="zine"] .conf-bar > span { background: #FF2D87; }
  [data-theme="zine"] .rank-num {
    font-family: 'Archivo Black', Impact, sans-serif !important;
    font-style: italic !important; font-weight: 400 !important;
    -webkit-text-stroke: 0;
    color: #FF2D87 !important;
    text-shadow: 3px 3px 0 #0A0A0A;
    letter-spacing: -.04em !important;
  }

  /* === DINER CHROME === butter cream, ketchup red, espresso brown, slab + script */
  [data-theme="diner"] {
    --paper: #F6EBD0;      /* butter cream */
    --paper-2: #EADBB4;
    --ink: #2B1810;        /* espresso */
    --ink-2: #5A3A26;
    --ink-3: #8C6A4D;
    --rule: #C9A86A;
    --rule-2: #8C6A4D;
    --tomato: #C8201E;     /* ketchup */
    --tomato-soft: #F3C9BB;
    --ochre: #E5A22C;      /* mustard */
    --ochre-soft: #F4D98A;
    --moss: #2F6B3A;       /* diner green */
    --card: #FFF5DC;
    --shadow-ink: 0 2px 0 #8C6A4D, 0 10px 24px -12px rgba(43,24,16,.35);
    --font-serif: 'Alfa Slab One', Georgia, serif;
    --font-sans:  'Inter', system-ui, sans-serif;
    --font-mono:  'IBM Plex Mono', ui-monospace, monospace;
  }
  [data-theme="diner"] .serif {
    font-family: var(--font-serif);
    font-style: normal !important;
    font-weight: 400 !important;
    letter-spacing: 0 !important;
  }
  [data-theme="diner"] .mono {
    font-family: 'Bebas Neue', Impact, sans-serif;
    letter-spacing: .08em !important;
    font-weight: 400 !important;
  }
  [data-theme="diner"] .app-shell {
    background:
      repeating-linear-gradient(0deg, transparent 0 31px, rgba(200,32,30,.06) 31px 32px),
      var(--paper);
  }
  [data-theme="diner"] .stripe-ph {
    background:
      repeating-linear-gradient(135deg, #F4D98A 0 10px, #C8201E 10px 11px);
  }
  [data-theme="diner"] .vote-pill {
    border: 2px solid var(--ink) !important;
    border-radius: 999px !important;
    font-weight: 700 !important;
  }
  [data-theme="diner"] .vote-pill.yes { background: #C8201E; color: #FFF5DC; border-color: #2B1810; }
  [data-theme="diner"] .vote-pill.no  { background: #FFF5DC; color: #2B1810; }
  [data-theme="diner"] .chip {
    border: 1.5px solid var(--ink-2); background: var(--card);
    font-weight: 600;
  }
  [data-theme="diner"] .chip.active { background: #C8201E; color: #FFF5DC; border-color: #C8201E; }
  [data-theme="diner"] .tab-btn.active { color: #C8201E; }
  [data-theme="diner"] .tab-btn.active::after { background: #C8201E; height: 3px; }
  [data-theme="diner"] .seg { background: var(--ink); border-color: var(--ink); padding: 3px; }
  [data-theme="diner"] .seg button { color: #F6EBD0; }
  [data-theme="diner"] .seg button.on { background: #E5A22C; color: #2B1810; }
  [data-theme="diner"] .navbar {
    background: var(--ink); border-top: 4px double #E5A22C; backdrop-filter: none;
  }
  [data-theme="diner"] .nav-btn { color: #C9A86A; }
  [data-theme="diner"] .nav-btn.active { color: #FFF5DC; background: #C8201E; }
  [data-theme="diner"] .conf-bar { background: var(--paper-2); height: 5px; }
  [data-theme="diner"] .conf-bar > span { background: #C8201E; }
  [data-theme="diner"] .rank-num {
    font-family: 'Alfa Slab One', Georgia, serif !important;
    font-style: normal !important; font-weight: 400 !important;
    color: #C8201E !important;
    text-shadow: 2px 2px 0 #2B1810;
    letter-spacing: 0 !important;
  }
  [data-theme="diner"] h1.serif,
  [data-theme="diner"] h2.serif,
  [data-theme="diner"] h3.serif { text-transform: uppercase; }

  /* === CHALKBOARD === slate green board, chalk white, handwritten script */
  [data-theme="chalk"] {
    --paper: #1E2A26;
    --paper-2: #2A3A34;
    --ink: #F5F0DF;
    --ink-2: #C8C0A8;
    --ink-3: #8A8570;
    --rule: #3F524B;
    --rule-2: #5D7066;
    --tomato: #F48F5A;
    --tomato-soft: #3A2A20;
    --ochre: #FFD65C;
    --ochre-soft: #3A3018;
    --moss: #9FD88E;
    --card: #26332E;
    --shadow-ink: inset 0 0 40px rgba(0,0,0,.4), 0 2px 0 rgba(0,0,0,.2);
  }
  [data-theme="chalk"] .serif {
    font-family: 'Caveat Brush', 'Fraunces', cursive !important;
    font-style: normal !important;
    font-weight: 400 !important;
    letter-spacing: .01em !important;
  }
  [data-theme="chalk"] .app-shell {
    background:
      radial-gradient(ellipse at 30% 0%, rgba(255,255,255,.04), transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(255,255,255,.03), transparent 55%),
      repeating-linear-gradient(0deg, transparent 0 38px, rgba(245,240,223,.04) 38px 39px),
      var(--paper);
    border-left: 8px solid #6B4A2B;
    border-right: 8px solid #6B4A2B;
  }
  [data-theme="chalk"] .app-shell::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.025) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,.02) 0, transparent 50%);
  }
  [data-theme="chalk"] .stripe-ph {
    background:
      repeating-linear-gradient(135deg, rgba(245,240,223,.08) 0 10px, transparent 10px 20px),
      var(--paper-2);
    border: 1px dashed var(--rule-2);
  }
  [data-theme="chalk"] .vote-pill { border: 1.5px dashed var(--ink-2) !important; background: transparent; }
  [data-theme="chalk"] .vote-pill.yes { background: rgba(244,143,90,.2); color: #F48F5A; border-color: #F48F5A !important; }
  [data-theme="chalk"] .vote-pill.no  { color: var(--ink-2); }
  [data-theme="chalk"] .chip { border: 1.5px dashed var(--ink-3); background: transparent; color: var(--ink); }
  [data-theme="chalk"] .chip.active { background: var(--ink); color: var(--paper); border-style: solid; }
  [data-theme="chalk"] .tab-btn.active::after { background: #FFD65C; }
  [data-theme="chalk"] .seg { background: var(--paper-2); border-color: var(--rule); }
  [data-theme="chalk"] .seg button.on { background: #FFD65C; color: var(--paper); }
  [data-theme="chalk"] .navbar { background: var(--paper); border-top: 1px dashed var(--rule-2); }
  [data-theme="chalk"] .nav-btn.active { background: var(--paper-2); color: #FFD65C; }
  [data-theme="chalk"] .conf-bar { background: rgba(245,240,223,.1); }
  [data-theme="chalk"] .conf-bar > span { background: #F48F5A; }
  [data-theme="chalk"] .rank-num {
    font-family: 'Caveat Brush', cursive !important;
    font-style: normal !important; font-weight: 400 !important;
    color: #FFD65C !important;
    text-shadow: 0 0 16px rgba(255,214,92,.3);
    letter-spacing: 0 !important;
  }

  /* === NEON NIGHT === vaporwave midnight, teal + hot pink neon glow */
  [data-theme="neon"] {
    --paper: #0B0421;
    --paper-2: #1A0A3D;
    --ink: #F8E9FF;
    --ink-2: #C7A3E8;
    --ink-3: #7D5FA5;
    --rule: #2B1560;
    --rule-2: #4A2AA0;
    --tomato: #FF3C9A;
    --tomato-soft: #2A0A1F;
    --ochre: #FFD93D;
    --ochre-soft: #2A2010;
    --moss: #3BF4E8;
    --card: #15082E;
    --shadow-ink: 0 0 24px rgba(255,60,154,.25), 0 0 48px rgba(59,244,232,.12);
  }
  [data-theme="neon"] .serif {
    font-family: 'Archivo', 'Fraunces', sans-serif !important;
    font-weight: 900 !important;
    font-style: italic !important;
    letter-spacing: -.02em !important;
    text-transform: uppercase;
  }
  [data-theme="neon"] .app-shell {
    background:
      radial-gradient(ellipse at 50% -10%, rgba(255,60,154,.18), transparent 50%),
      radial-gradient(ellipse at 0% 60%, rgba(59,244,232,.12), transparent 55%),
      radial-gradient(ellipse at 100% 90%, rgba(255,60,154,.1), transparent 50%),
      linear-gradient(180deg, #0B0421 0%, #1A0A3D 100%);
  }
  [data-theme="neon"] .app-shell::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(59,244,232,.025) 3px 4px);
  }
  [data-theme="neon"] .stripe-ph {
    background:
      linear-gradient(135deg, #FF3C9A 0%, #7D5FA5 50%, #3BF4E8 100%);
    box-shadow: inset 0 0 20px rgba(0,0,0,.3);
  }
  [data-theme="neon"] .vote-pill.yes {
    background: transparent; color: #FF3C9A; border: 1.5px solid #FF3C9A !important;
    text-shadow: 0 0 8px #FF3C9A;
    box-shadow: 0 0 12px rgba(255,60,154,.5), inset 0 0 12px rgba(255,60,154,.1);
  }
  [data-theme="neon"] .vote-pill.no {
    background: transparent; color: #3BF4E8; border: 1.5px solid #3BF4E8 !important;
    text-shadow: 0 0 8px #3BF4E8;
  }
  [data-theme="neon"] .chip { background: rgba(255,255,255,.04); border: 1px solid var(--rule-2); backdrop-filter: blur(6px); }
  [data-theme="neon"] .chip.active {
    background: linear-gradient(90deg, #FF3C9A, #3BF4E8); color: #0B0421;
    border-color: transparent; text-shadow: none;
    box-shadow: 0 0 16px rgba(255,60,154,.5);
  }
  [data-theme="neon"] .tab-btn.active::after { background: #3BF4E8; box-shadow: 0 0 10px #3BF4E8; height: 3px; }
  [data-theme="neon"] .seg { background: rgba(255,255,255,.04); border-color: var(--rule-2); }
  [data-theme="neon"] .seg button.on {
    background: linear-gradient(90deg, #FF3C9A, #3BF4E8); color: #0B0421;
    box-shadow: 0 0 12px rgba(255,60,154,.4);
  }
  [data-theme="neon"] .navbar { background: rgba(11,4,33,.85); border-top: 1px solid var(--rule-2); }
  [data-theme="neon"] .nav-btn.active { color: #3BF4E8; background: rgba(59,244,232,.08); text-shadow: 0 0 8px #3BF4E8; }
  [data-theme="neon"] .conf-bar { background: var(--paper-2); }
  [data-theme="neon"] .conf-bar > span {
    background: linear-gradient(90deg, #FF3C9A, #3BF4E8);
    box-shadow: 0 0 10px rgba(255,60,154,.4);
  }
  [data-theme="neon"] .rank-num {
    font-family: 'Archivo', sans-serif !important;
    font-weight: 900 !important; font-style: italic !important;
    color: #FF3C9A !important;
    text-shadow: 0 0 20px #FF3C9A, 0 0 40px rgba(255,60,154,.5);
    letter-spacing: -.03em !important;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0B0A09; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }
  .app-shell {
    max-width: 440px; margin: 0 auto;
    min-height: 100dvh;
    background: var(--paper);
    color: var(--ink);
    position: relative;
    overflow-x: hidden;
  }
  .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .hairline { border-top: 1px solid var(--rule); }
  .hairline-b { border-bottom: 1px solid var(--rule); }
  button { font-family: inherit; color: inherit; }
  input, textarea { font-family: inherit; }
  /* Paper grain (subtle) */
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(26,23,20,.04) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
  }
  [data-theme="dusk"] .grain::before { background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px); mix-blend-mode: screen; }

  /* Scrollbars hidden for strips */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Striped placeholder */
  .stripe-ph {
    background:
      repeating-linear-gradient(135deg, var(--paper-2) 0 8px, var(--rule) 8px 9px);
  }

  /* Tabs */
  .tab-btn {
    flex: 1; padding: 12px 8px; background: transparent; border: 0; cursor: pointer;
    font: 600 13px/1 'Inter'; letter-spacing: .02em; color: var(--ink-3);
    text-transform: uppercase; position: relative;
  }
  .tab-btn.active { color: var(--ink); }
  .tab-btn.active::after {
    content: ""; position: absolute; left: 20%; right: 20%; bottom: -1px; height: 2px;
    background: var(--tomato);
  }

  /* Vote pill */
  .vote-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding: 6px 10px; border-radius: 999px; font: 600 12px/1 'Inter';
    border: 1px solid var(--rule);
    background: var(--card);
    white-space: nowrap;
  }
  .vote-pill.yes { background: #E8D2CB; color: var(--tomato); border-color: transparent; }
  [data-theme="dusk"] .vote-pill.yes { background: #3A2520; }
  .vote-pill.no { background: var(--paper-2); color: var(--ink-2); }

  /* Rank numeral */
  .rank-num {
    font-family: 'Fraunces', serif; font-weight: 900; font-style: italic;
    font-feature-settings: "ss01";
    font-variation-settings: "opsz" 144;
    line-height: .85; color: var(--ink);
  }

  /* Shelf chip */
  .chip {
    display:inline-flex; align-items:center; gap:6px;
    padding: 4px 10px; border-radius: 999px; font: 500 11px/1 'Inter';
    background: var(--paper-2); color: var(--ink-2);
    border: 1px solid var(--rule);
  }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Card press */
  .press { transition: transform .12s ease; }
  .press:active { transform: scale(.985); }

  /* Floating nav */
  .navbar {
    position: sticky; bottom: 0; left: 0; right: 0; z-index: 40;
    background: color-mix(in oklab, var(--paper) 90%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    border-top: 1px solid var(--rule);
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 0px));
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: transparent; border: 0; padding: 8px 4px; cursor: pointer;
    color: var(--ink-3); font: 500 10px/1 'Inter'; letter-spacing: .04em;
    text-transform: uppercase; border-radius: 10px;
  }
  .nav-btn.active { color: var(--ink); background: var(--paper-2); }

  /* Focused dish sheet */
  .sheet-back {
    position: fixed; inset: 0; background: rgba(10,8,6,.5);

  /* Highlight mark */
  .mark {
    background: linear-gradient(transparent 60%, rgba(197,65,42,.2) 60% 95%, transparent 95%);

  }

  /* Quote */
  .quote-card {
    border-left: 3px solid var(--tomato);
    padding: 4px 14px;
  }

  /* Map placeholder grid */
  .map-bg {
    background:

      linear-gradient(90deg, var(--rule) 1px, transparent 1px) 0 0/ 22px 22px,

  /* Dot */

  /* Header fade */
  .page-scroll { padding-bottom: 24px; }
</style>

// ---- Browse page ----
function BrowsePage({ dishes, view, onOpen, bookmarks, toggleBookmark, cat, setCat, q, setQ }) {
  const filtered = dishes
    .filter(d => cat==='all' || d.category === cat)
    .filter(d => !q || (d.name+d.restaurant).toLowerCase().includes(q.toLowerCase()));
  return (
    <>
      <SearchRow value={q} onChange={setQ}/>
      <CatStrip active={cat} setActive={setCat}/>
      <Section kicker={`${filtered.length} ranked`} title={cat==='all' ? 'Top dishes on the island' : `Top ${CATS.find(c=>c.id===cat)?.label?.toLowerCase()}`}/>
      {view === 'list' && (
        <div style={{padding:'0 20px'}}>
          {filtered.map((d, i) => (
            <DishRow key={d.id} dish={d} rank={i+1} onOpen={()=>onOpen(d)} bookmarked={bookmarks.has(d.id)} onBookmark={()=>toggleBookmark(d.id)} />
          ))}
        </div>
      )}
      {view === 'grid' && (
        <div style={{padding:'0 20px', display:'grid', gridTemplateColumns:'1fr 1fr', gap: 12}}>
          {filtered.map((d, i) => <DishCard key={d.id} dish={d} rank={i+1} onOpen={()=>onOpen(d)}/>)}

      )}
      {view === 'map' && <div style={{padding:'0 20px 20px'}}><MapFull dishes={filtered} onOpen={onOpen}/></div>}

}

function Stat({ n, l, delta, tint, divider }) {
  return (
    <div style={{padding:'14px 10px', textAlign:'center', borderLeft: divider ? '1px solid var(--rule)' : 'none', position:'relative'}}>

      {delta && <div className="mono" style={{fontSize:9, color:'var(--ink-3)', marginTop:3}}>{delta}</div>}
    </div>
  );
}

// ---- App ----
function App() {
  const [tab, setTab] = useState('home');
  const [cat, setCat] = useState('all');
  const [q, setQ] = useState('');
  const [shelf, setShelf] = useState('tried');
  const [voteIdx, setVoteIdx] = useState(1);
  const [openDish, setOpenDish] = useState(null);
  const [bookmarks, setBookmarks] = useState(new Set(['margherita-rockfish','tuna-bowl-catboat']));
  const [toast, setToast] = useState('');
  const [tweaks, setTweaks] = useState(DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [studioOpen, setStudioOpen] = useState(null); // null | 'onboard' | 'edit'

  // First-run onboarding
  useEffect(() => {
    try {
      const seen = localStorage.getItem('wgh.onboarded');
      if (!seen) {
        setTimeout(()=>setStudioOpen('onboard'), 400);
      }
    } catch(e) {}
  }, []);

  // Expose opener globally so nested children (Profile) can call it
  useEffect(() => {
    window.__openStudio = () => setStudioOpen('edit');
    return () => { delete window.__openStudio; };
  }, []);

  // Tweaks edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function setTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }

  function toggleBookmark(id) {
    setBookmarks(prev => {
      const n = new Set(prev);
      if (n.has(id)) { n.delete(id); showToast('Removed from Want to try'); }
      else { n.add(id); showToast('Saved to Want to try'); }
      return n;
    });
  }

  function showToast(t) { setToast(t); setTimeout(()=>setToast(''), 1600); }

  function onVote(id, v) {
    showToast(v==='yes' ? 'Vote cast · Worth it 🔥' : 'Vote cast · Skipped');
    setVoteIdx(i => (i + 1) % DATA.dishes.length);
  }

  return (
    <div className="app-shell grain" data-theme={tweaks.theme} data-density={tweaks.density}>
      {/* page */}
      <div className="page-scroll">
        {tab === 'home' && (
          <>
            <Masthead town={DATA.town} onTown={()=>showToast('Town picker (Edgartown, Oak Bluffs, …)')}/>
            <TonightPick dish={DATA.dishes[0]} onOpen={()=>setOpenDish(DATA.dishes[0])}/>
            <Activity items={DATA.activity}/>
            <Section kicker="Top · Martha's Vineyard" title="This week's rank" more="Browse all"/>
            <div style={{padding:'0 20px 6px', display:'flex', justifyContent:'flex-end'}}>
              <div className="seg">
                {[['list','List'],['grid','Cards'],['map','Map']].map(([id,l]) => (
                  <button key={id} className={tweaks.rankingView===id?'on':''} onClick={()=>setTweak('rankingView', id)}>{l}</button>
                ))}
              </div>
            </div>
            {tweaks.rankingView==='list' && (
              <div style={{padding:'0 20px'}}>
                {DATA.dishes.slice(0,5).map((d,i) => (
                  <DishRow key={d.id} dish={d} rank={i+1} onOpen={()=>setOpenDish(d)} bookmarked={bookmarks.has(d.id)} onBookmark={()=>toggleBookmark(d.id)} />
                ))}
              </div>
            )}
            {tweaks.rankingView==='grid' && (
              <div style={{padding:'0 20px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                {DATA.dishes.slice(0,6).map((d,i) => <DishCard key={d.id} dish={d} rank={i+1} onOpen={()=>setOpenDish(d)}/>)}
              </div>
            )}
            {tweaks.rankingView==='map' && <MapMini/>}

            <Section kicker="Fresh from locals" title="Lists you might follow" more="See all"/>
            <div style={{padding:'0 20px 20px', display:'flex', flexDirection:'column', gap: 10}}>
              <div style={{display:'flex', flexDirection:'column', gap: 10}}>
          {DATA.lists.slice(0,2).map((l, i) => <PublicListCard key={l.id} list={l} idx={i+1}/>)}
        </div>
            </div>
          </>
        )}
        {tab === 'browse' && (
          <BrowsePage dishes={DATA.dishes} view={tweaks.rankingView} onOpen={setOpenDish} bookmarks={bookmarks} toggleBookmark={toggleBookmark} cat={cat} setCat={setCat} q={q} setQ={setQ}/>
        )}
        {tab === 'vote' && (
          <VoteBallot dish={DATA.dishes[voteIdx]} onVote={onVote} onSkip={()=>{ setVoteIdx(i=>(i+1)%DATA.dishes.length); showToast('Marked not tried'); }}/>
        )}
        {tab === 'lists' && <ListsPage lists={DATA.lists} shelf={shelf} setShelf={setShelf}/>}
        {tab === 'profile' && <ProfilePage user={DATA.user} currentTheme={tweaks.theme}/>}
      </div>

      {/* Dish sheet */}
      {openDish && (
        <>
          <div className={"sheet-back show"} onClick={()=>setOpenDish(null)}/>
          <DishSheet dish={openDish} onClose={()=>setOpenDish(null)} bookmarks={bookmarks} toggleBookmark={toggleBookmark}/>
        </>
      )}

      {/* Toast */}
      <div className={"toast " + (toast ? 'show' : '')}>{toast}</div>

      {/* Design Studio */}
      {studioOpen && (
        <DesignStudio
          mode={studioOpen}
          currentTheme={tweaks.theme}
          onClose={()=>setStudioOpen(null)}
          onPick={(id)=>{
            setTweak('theme', id);
            try { localStorage.setItem('wgh.onboarded', '1'); } catch(e) {}
            setStudioOpen(null);
            showToast('Theme saved · ' + (THEME_LABEL[id] || id));
          }}
        />
      )}

      {/* Tweaks panel */}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>setTweaksOpen(false)}/>}

      {/* Nav */}
      <nav className="navbar">
        {[
          ['home','Home',Icon.Home],
          ['browse','Rank',Icon.Browse],
          ['vote','Vote',Icon.Vote],
          ['lists','Lists',Icon.List],
          ['profile','You',Icon.Profile],
        ].map(([id,l,Ic]) => (
          <button key={id} className={"nav-btn " + (tab===id?'active':'')} onClick={()=>{ setTab(id); window.scrollTo({top:0, behavior:'auto'}); }}>
            <Ic/><span>{l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
