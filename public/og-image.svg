<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Warm Appetite palette: stone bg, near-black ink, amber accent -->
  <rect width="1200" height="630" fill="#F0ECE8"/>

  <!-- Top accent strip -->
  <rect x="0" y="0" width="1200" height="8" fill="#E4440A"/>
  <!-- Bottom accent strip -->
  <rect x="0" y="622" width="1200" height="8" fill="#C48A12"/>

  <!-- Brand wordmark (sans-serif for reliable cairosvg rendering) -->
  <text x="600" y="270" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="800" font-size="72" fill="#1A1A1A" letter-spacing="-1">What's <tspan fill="#C48A12">Good</tspan> Here</text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="500" font-size="30" fill="#555555" letter-spacing="0.3">
    The best dishes, ranked by locals
  </text>

  <!-- Location pill -->
  <rect x="395" y="400" width="410" height="56" rx="28" fill="#FFFFFF" stroke="#E4440A" stroke-width="2"/>
  <text x="600" y="436" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="700" font-size="21" fill="#E4440A" letter-spacing="2">
    MARTHA'S VINEYARD &amp; BEYOND
  </text>

  <!-- Accent dots -->
  <circle cx="555" cy="530" r="6" fill="#E4440A"/>
  <circle cx="580" cy="530" r="6" fill="#C48A12"/>
  <circle cx="605" cy="530" r="6" fill="#1A1A1A"/>
  <circle cx="630" cy="530" r="6" fill="#C48A12"/>
  <circle cx="655" cy="530" r="6" fill="#E4440A"/>

  <!-- Domain -->
  <text x="600" y="590" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-weight="700" font-size="18" fill="#999999" letter-spacing="3">
    WGHAPP.COM
  </text>
</svg>
