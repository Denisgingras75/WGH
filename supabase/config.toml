# Supabase project config. Only non-default settings go here.
# See: https://supabase.com/docs/guides/local-development/cli/config

# delete-account performs its own JWT verification inside the function (via the anon
# client's auth.getUser()). Disable the gateway's JWT check so the function runs even
# when the gateway rejects the token. Without this, some valid user JWTs were being
# rejected at the gateway with 401 "Invalid JWT" before the function could run.
[functions.delete-account]
verify_jwt = false

# menu-refresh is invoked by pg_cron using the legacy service_role JWT from vault.
# The Supabase Functions gateway stopped accepting that legacy JWT around 2026-04-12,
# returning 401 for every cron call and silently stalling every menu import since.
# The function auths to the DB via its own SUPABASE_SERVICE_ROLE_KEY env var, so the
# gateway check is pure gating — disable it. Request body only accepts {mode},
# {restaurant_id} (must match an existing row), or {} — no arbitrary URL injection.
[functions.menu-refresh]
verify_jwt = false

# places-details is called from the browser with the publishable anon key. The
# Supabase Functions gateway rejects the new-format sb_publishable_* key as
# "UNAUTHORIZED_INVALID_JWT_FORMAT" because it checks JWT shape. The function
# itself does no DB mutation — it proxies Google Places Details with the server's
# GOOGLE_PLACES_API_KEY and returns public place data. Same gating exception as
# places-autocomplete (which is already open and serving from production).
[functions.places-details]
verify_jwt = false
